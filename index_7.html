<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="A warm, jargon-free space for women in their 20s to feel confident with money. Free forever, no ads, made by two students at UCD.">
<meta name="theme-color" content="#8E2B4C">
<title>Money, honestly &mdash; a finance hub for women in their 20s</title>
<style>
  html, body { margin: 0; padding: 0; background: #FBF6F1; }
  #root { min-height: 100vh; }
  * { -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>
<!-- =====================================================================
     SETTINGS  -  edit the three values below, then save the file.
     Leave a value as ""  to keep that feature off.
     Nothing collected here identifies any visitor by name.
     ===================================================================== -->
<script>
window.HUB_CONFIG = {
  // 1) SHARED DATA COLLECTION  (turn this on to measure engagement)
  //    Make a free Supabase project, run the SQL from the README once,
  //    then paste your Project URL and the anon public key below.
  SUPABASE_URL: "",
  SUPABASE_KEY: "",

  // 2) PENNY THE CHATBOT  (optional)
  //    RECOMMENDED (key stays secret): leave this empty, deploy the
  //    api/penny.js file next to this one on Vercel, and set an
  //    environment variable ANTHROPIC_API_KEY in the Vercel project.
  //    QUICK TEST ONLY: paste a key here. It is visible to visitors,
  //    so use a small capped key and delete it after the pilot.
  ANTHROPIC_API_KEY: "",

  //    If your Penny proxy lives at a different URL, set it here.
  PENNY_ENDPOINT: "",

  // 3) FEEDBACK EMAIL
  //    Your email address, so the "send from your email app" button
  //    on the About page knows where to send feedback.
  FEEDBACK_EMAIL: ""
};
</script>
