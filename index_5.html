<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="A warm, jargon-free space for women in their 20s to feel confident with money. Free forever, no ads, made by two students at UCD.">

  ANTHROPIC_API_KEY: "",

  //    If your Penny proxy lives at a different URL, set it here.
  PENNY_ENDPOINT: ""
};
</script>
